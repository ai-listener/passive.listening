<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下手くそ傾聴マシン</title>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; background: #fdf2f2; }
        #chat-log { height: 450px; overflow-y: auto; background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #ffccd5; }
        .user { color: #444; margin-bottom: 15px; text-align: right; padding-left: 20%; font-size: 0.9em; }
        .machine { color: #d63384; margin-bottom: 25px; font-weight: bold; border-left: 5px solid #ff4d94; padding-left: 15px; white-space: pre-wrap; line-height: 1.6; }
        .input-area { display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; padding: 15px; border: 2px solid #ffccd5; border-radius: 10px; font-size: 16px; resize: none; box-sizing: border-box; }
        button { padding: 12px; background: #ff4d94; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #e60073; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #d63384;">💗 下手くそ傾聴マシン 💗</h2>
    <p style="font-size: 0.8em; text-align: center; color: #888;">あなたの悩み、一文字残らず受け止めます（自動で）。</p>
    
    <div id="chat-log"></div>
    
    <div class="input-area">
        <textarea id="user-input" rows="6" placeholder="100字〜1000字の悩みをぶつけてください..."></textarea>
        <button onclick="sendMessage()">魂の相談を送信する</button>
    </div>

    <script src="env-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
