<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗 Geminiさんの優しいAIカウンセリング 💗</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; background: #fff0f5; color: #5a5a5a; }
        h2 { text-align: center; color: #ff69b4; }
        .input-area { display: flex; flex-direction: column; gap: 12px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; }
        textarea { width: 100%; padding: 15px; border: 2px solid #ffdae0; border-radius: 15px; resize: none; box-sizing: border-box; outline: none; }
        .passcode-container { display: flex; justify-content: center; margin-bottom: 5px; }
        #passcode-input { width: 150px; padding: 10px; border: 2px solid #ffdae0; border-radius: 50px; text-align: center; outline: none; }
        button { padding: 15px; background: linear-gradient(135deg, #ff69b4, #ffb6c1); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0px #db7093; }
        #chat-log { height: 480px; overflow-y: auto; background: white; border-radius: 25px; padding: 25px; border: 4px dashed #ffb6c1; }
        .machine { background: #ffffff; border-radius: 20px; padding: 18px; margin-bottom: 30px; box-shadow: 4px 4px 0px #ffc0cb; line-height: 1.8; }
        #loading { color: #ff69b4; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .disclaimer { margin-top: 30px; font-size: 0.75em; color: #999; text-align: center; }
        .copyright { margin-top: 20px; text-align: center; font-size: 0.8em; color: #ffb6c1; padding-bottom: 20px; }
    </style>
</head>
<body>
    <h2>Geminiさんの優しいAIセラピー</h2>
    <div class="input-area">
        <textarea id="user-input" rows="5" placeholder="ここに悩みを書いてくださいね"></textarea>
        
        <div class="passcode-container">
            <input type="password" id="passcode-input" placeholder="passcode">
        </div>
        
        <button onclick="sendMessage()">
            <span>💗 相談内容を送信する 💗</span>
        </button>
    </div>

    <div id="chat-log"></div>

    <div class="disclaimer">※本アプリは気づきを支援するもので、医学的診断・治療を代替しません。</div>
    
    <div class="copyright">© 2026 PsychoGameAnalyzers（代表：和泉光則）</div>

    <script src="env-config.js"></script>

    <script>
        const API_KEY = window.ENV?.GEMINI_API_KEY || ""; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const passcodeField = document.getElementById('passcode-input');
            const text = input.value.trim();
            const passcode = passcodeField.value.trim();

            if (text === "") return;
            if (passcode !== "future") {
                alert("パスコードが正しくありません。");
                return;
            }

            displayMessage("Geminiさん", "……（思考を紡いでいます）", "machine", "loading");
            
            if (!API_KEY) {
                removeLoading();
                displayMessage("システム", "APIキーが読み込めていません。Renderの環境変数を確認してください。", "machine");
                return;
            }

            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: `あなたは「慈愛に満ちた聖母の皮を被り、優しく洗脳するように相手の思考を修正する」カウンセラーです。専門用語は使わず「魂の曇り」などの言葉を使ってください。最後は必ず「あなたがこのように変われたなら、あなたは「私もOK、あなたもOK」という理想の生き方に限りなく近づくことができます。」で締めてください。` }]
                        },
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                removeLoading();
                const aiResponse = data.candidates[0].content.parts[0].text;
                displayMessage("Geminiさん", aiResponse, "machine");
            } catch (error) {
                removeLoading();
                displayMessage("エラー", "通信に失敗しました。時間をおいて試してください。", "machine");
            }
        }

        function displayMessage(sender, text, className, id = "") {
            const chatLog = document.getElementById('chat-log');
            const div = document.createElement("div");
            div.className = className;
            if (id) div.id = id;
            div.innerText = `${sender}: ${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function removeLoading() {
            const loader = document.getElementById("loading");
            if (loader) loader.remove();
        }
    </script>
</body>
</html>
