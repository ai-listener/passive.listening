<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下手くそ傾聴マシン</title>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #e5e5e5; }
        #chat-log { height: 400px; overflow-y: auto; background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .user { color: #2c3e50; margin-bottom: 10px; text-align: right; }
        .machine { color: #e74c3c; margin-bottom: 20px; font-weight: bold; border-left: 4px solid #e74c3c; padding-left: 10px; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <h2>下手くそ傾聴マシン v1.1</h2>
    <div id="chat-log"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="悩みをどうぞ...">
        <button onclick="sendMessage()">送信</button>
    </div>

    <script src="env-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
